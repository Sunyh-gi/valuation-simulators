<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PB 市净率模拟器</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #fff; color: #1e293b; padding: 10px; max-width: 720px; margin: 0 auto;
}

/* Compact header */
.head-bar { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.head-bar h1 { font-size:15px; font-weight:600; white-space:nowrap; }
.head-bar .formula {
  background: linear-gradient(135deg,#E8EDF3,#eef2f8); border:1px solid #CDD6E4;
  border-radius:8px; padding:3px 12px; font-size:13px; font-weight:600; color:#2C3E6B;
  white-space:nowrap;
}

/* Control panel (shared by both slider groups) */
.cp {
  display:grid; grid-template-columns:1fr 1fr; gap:8px;
  background:#fff; border:1px solid #e2e8f0; border-radius:10px;
  padding:6px 10px 4px; margin-bottom:6px;
}
.cp3 { grid-template-columns:1fr 1fr 1fr; }
.cp label {
  font-size:11px; color:#64748b; display:flex; justify-content:space-between; margin-bottom:1px;
}
.cp label span { color:#1e293b; font-weight:600; font-size:11px; }
.cp input[type="range"] {
  -webkit-appearance:none; appearance:none; width:100%; height:2px;
  border-radius:1px; background:#e2e8f0; outline:none; margin:1px 0;
}
.cp input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance:none; width:12px; height:12px; border-radius:50%;
  background:#2C3E6B; cursor:pointer; border:1.5px solid #fff;
  box-shadow:0 1px 2px rgba(44,62,107,0.3);
}
.cp input[type="range"]::-moz-range-thumb {
  width:12px; height:12px; border-radius:50%; background:#2C3E6B;
  cursor:pointer; border:1.5px solid #fff; box-shadow:0 1px 2px rgba(44,62,107,0.3);
}
.cp .rl { display:flex; justify-content:space-between; font-size:9px; color:#94a3b8; }
@media (max-width:480px) {
  .cp3 { grid-template-columns:1fr; }
}

/* PB main display */
.pb-row {
  display:flex; align-items:center; gap:10px;
  background:#fff; border:1px solid #e2e8f0; border-radius:10px;
  padding:6px 14px; margin-bottom:6px;
}
.pb-main { flex-shrink:0; text-align:center; min-width:60px; }
.pb-main .lbl { font-size:9px; color:#94a3b8; letter-spacing:0.3px; }
.pb-main .val { font-size:32px; font-weight:700; line-height:1.1; transition:color 0.2s; }
.pb-meta { flex:1; display:flex; flex-wrap:wrap; align-items:center; gap:4px 8px; }
.pb-meta .badge {
  font-size:10px; font-weight:600; padding:2px 8px; border-radius:12px; white-space:nowrap;
}
.bg-green { background:#dcfce7; color:#15803d; }
.bg-amber { background:#fef3c7; color:#92400e; }
.bg-red { background:#fce4ec; color:#c62828; }
.bg-blue { background:#e6f1fb; color:#185fa5; }
.pb-meta .s { font-size:11px; color:#64748b; }
.pb-meta .s b { color:#1e293b; }
.pb-meta .theo-badge {
  font-size:10px; padding:2px 8px; border-radius:6px; white-space:nowrap;
}

/* Metric row */
.mr { display:flex; gap:5px; margin-bottom:6px; }
.mr-card {
  background:#fff; border:1px solid #e2e8f0; border-radius:8px;
  padding:5px 6px; text-align:center; flex:1; min-width:60px;
}
.mr-card .lbl { font-size:9px; color:#94a3b8; font-weight:500; letter-spacing:0.2px; }
.mr-card .val { font-size:16px; font-weight:600; color:#1e293b; line-height:1.3; }

/* Chart */
.cv {
  background:#fff; border:1px solid #e2e8f0; border-radius:10px;
  padding:6px 10px; margin-bottom:4px;
}
.cv canvas { display:block; width:100%; height:130px; }

/* Footer note */
.fn { font-size:10px; color:#94a3b8; line-height:1.4; }
</style>
</head>
<body>

<!-- Header -->
<div class="head-bar">
  <h1>PB 市净率模拟器</h1>
  <span class="formula">PB = 市值 / 净资产</span>
</div>

<!-- Basic parameters -->
<div class="cp">
  <div class="cg">
    <label>总市值（亿） <span id="mcapVal">2,000</span></label>
    <input type="range" id="mcapSlider" min="10" max="30000" value="2000" step="10">
    <div class="rl"><span>10</span><span>30,000</span></div>
  </div>
  <div class="cg">
    <label>净资产（亿） <span id="equityVal">1,000</span></label>
    <input type="range" id="equitySlider" min="5" max="15000" value="1000" step="5">
    <div class="rl"><span>5</span><span>15,000</span></div>
  </div>
</div>

<!-- PB main display + status + theory -->
<div class="pb-row">
  <div class="pb-main">
    <div class="lbl">PB</div>
    <div class="val" id="pbDisplay">2.00</div>
  </div>
  <div class="pb-meta">
    <span class="badge bg-blue" id="statusBadge">溢价</span>
    <span class="s"><b id="mcapMetric">2,000亿</b> / <b id="equityMetric">1,000亿</b></span>
    <span class="s">溢价 <b id="premiumMetric">+100%</b></span>
    <span class="s">隐含ROE <b id="impliedROE">12.0%</b></span>
    <span class="theo-badge" id="theoGap" style="background:#fef3c7;color:#92400e;">偏高 16.7%</span>
  </div>
</div>

<!-- Metric row -->
<div class="mr">
  <div class="mr-card">
    <div class="lbl">市值</div>
    <div class="val" id="mcapMr">2,000亿</div>
  </div>
  <div class="mr-card">
    <div class="lbl">净资产</div>
    <div class="val" id="equityMr">1,000亿</div>
  </div>
  <div class="mr-card">
    <div class="lbl">当前PB</div>
    <div class="val" id="pbMr">2.00x</div>
  </div>
  <div class="mr-card">
    <div class="lbl">理论PB</div>
    <div class="val" id="theoMr">1.29x</div>
  </div>
</div>

<!-- PB-ROE theoretical model -->
<div class="cp cp3">
  <div class="cg">
    <label>ROE <span id="roeVal">12%</span></label>
    <input type="range" id="roeSlider" min="2" max="40" value="12" step="0.5">
    <div class="rl"><span>2%</span><span>40%</span></div>
  </div>
  <div class="cg">
    <label>r 权益成本 <span id="rVal">10%</span></label>
    <input type="range" id="rSlider" min="6" max="18" value="10" step="0.5">
    <div class="rl"><span>6%</span><span>18%</span></div>
  </div>
  <div class="cg">
    <label>g 永续增长率 <span id="gVal">3%</span></label>
    <input type="range" id="gSlider" min="0" max="8" value="3" step="0.5">
    <div class="rl"><span>0%</span><span>8%</span></div>
  </div>
</div>

<!-- Chart -->
<div class="cv">
  <canvas id="pbChart" height="130"></canvas>
</div>

<!-- Footer -->
<p class="fn">理论 PB = (ROE - g) / (r - g)。PB &gt; 1 溢价，PB &lt; 1 破净。银行/保险/地产估值首选，互联网/软件股参考有限。</p>

<script>
(function() {
  var mcapS = document.getElementById('mcapSlider');
  var equityS = document.getElementById('equitySlider');
  var roeS = document.getElementById('roeSlider');
  var rS = document.getElementById('rSlider');
  var gS = document.getElementById('gSlider');
  var canvas = document.getElementById('pbChart');
  var ctx = canvas.getContext('2d');

  function fmtNum(n) {
    if (n >= 10000) return (n / 10000).toFixed(2) + '万亿';
    return n.toLocaleString('zh-CN') + '亿';
  }
  function fmtShort(n) {
    if (n >= 10000) return (n/10000).toFixed(1) + '万亿';
    if (n >= 1000) return (n/1000).toFixed(1) + '千亿';
    return n.toFixed(0) + '亿';
  }

  function getDPI() {
    var dpr = window.devicePixelRatio || 1;
    var rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    return { w: rect.width, h: rect.height };
  }

  function update() {
    var mcap = parseFloat(mcapS.value);
    var equity = parseFloat(equityS.value);
    var roePct = parseFloat(roeS.value);
    var rPct = parseFloat(rS.value);
    var gPct = parseFloat(gS.value);

    var roe = roePct / 100;
    var r = rPct / 100;
    var g = gPct / 100;

    var pb = equity > 0 ? (mcap / equity) : 0;
    var premium = ((pb - 1) * 100);
    var premiumStr = premium >= 0 ? '+' + premium.toFixed(1) + '%' : premium.toFixed(1) + '%';
    var implRoe = (r - g) * pb + g;
    if (!isFinite(implRoe) || implRoe < 0) implRoe = 0;

    // Theoretical PB
    var theoPB = 0, theoValid = false;
    if (roe > g && r > g && r > 0) { theoPB = (roe - g) / (r - g); theoValid = true; }

    // Update labels
    document.getElementById('mcapVal').textContent = fmtShort(mcap);
    document.getElementById('equityVal').textContent = fmtShort(equity);
    document.getElementById('roeVal').textContent = roePct + '%';
    document.getElementById('rVal').textContent = rPct + '%';
    document.getElementById('gVal').textContent = gPct + '%';

    // PB main display
    var pbDisp = document.getElementById('pbDisplay');
    pbDisp.textContent = pb.toFixed(2);
    var badge = document.getElementById('statusBadge');
    var theoGap = document.getElementById('theoGap');

    if (pb < 0.5) {
      pbDisp.style.color = '#c62828';
      badge.textContent = '深度破净'; badge.className = 'badge bg-red';
    } else if (pb < 0.8) {
      pbDisp.style.color = '#d97706';
      badge.textContent = '破净'; badge.className = 'badge bg-amber';
    } else if (pb < 1.2) {
      pbDisp.style.color = '#185fa5';
      badge.textContent = '平价'; badge.className = 'badge bg-blue';
    } else if (pb < 2.5) {
      pbDisp.style.color = '#15803d';
      badge.textContent = '溢价'; badge.className = 'badge bg-green';
    } else {
      pbDisp.style.color = '#15803d';
      badge.textContent = '高度溢价'; badge.className = 'badge bg-green';
    }

    // PB meta inline
    document.getElementById('mcapMetric').textContent = fmtShort(mcap);
    document.getElementById('equityMetric').textContent = fmtShort(equity);
    document.getElementById('premiumMetric').textContent = premiumStr;
    document.getElementById('impliedROE').textContent = (implRoe * 100).toFixed(1) + '%';

    // Theory comparison
    if (theoValid) {
      var gapPct = theoPB > 0 ? ((pb / theoPB) - 1) * 100 : 0;
      var txt;
      if (Math.abs(gapPct) < 5) { txt = '≈理论值'; theoGap.style.background='#dcfce7'; theoGap.style.color='#15803d'; }
      else if (gapPct > 0) { txt = '偏高 ' + gapPct.toFixed(1) + '%'; theoGap.style.background='#fef3c7'; theoGap.style.color='#92400e'; }
      else { txt = '偏低 ' + Math.abs(gapPct).toFixed(1) + '%'; theoGap.style.background='#e6f1fb'; theoGap.style.color='#185fa5'; }
      theoGap.textContent = txt;
    } else {
      theoGap.textContent = 'ROE≤g';
      theoGap.style.background = '#f1f5f9'; theoGap.style.color = '#64748b';
    }

    // Metric row
    document.getElementById('mcapMr').textContent = fmtShort(mcap).replace('亿','') + '亿';
    document.getElementById('equityMr').textContent = fmtShort(equity).replace('亿','') + '亿';
    document.getElementById('pbMr').textContent = pb.toFixed(2) + 'x';
    document.getElementById('theoMr').textContent = theoValid ? theoPB.toFixed(2) + 'x' : '—';

    drawChart(roePct, rPct, gPct, pb);
  }

  function drawChart(roePct, rPct, gPct, currentPB) {
    var dim = getDPI();
    var w = dim.w, h = dim.h;
    var pad = { top: 14, bottom: 18, left: 38, right: 10 };
    var plotW = w - pad.left - pad.right;
    var plotH = h - pad.top - pad.bottom;

    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = '#fafbfc';
    ctx.fillRect(0, 0, w, h);

    var xMin = 2, xMax = 40;
    var yMin = 0, yMax = 6;

    function xPos(val) { return pad.left + (val - xMin) / (xMax - xMin) * plotW; }
    function yPos(val) { return pad.top + plotH - (val - yMin) / (yMax - yMin) * plotH; }

    // Grid
    ctx.strokeStyle = '#f1f5f9';
    ctx.lineWidth = 0.5;
    for (var y = 0; y <= 6; y += 1) {
      ctx.beginPath(); ctx.moveTo(pad.left, yPos(y)); ctx.lineTo(pad.left+plotW, yPos(y)); ctx.stroke();
      ctx.fillStyle = '#94a3b8';
      ctx.font = '9px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.textAlign = 'right'; ctx.fillText(y.toFixed(1)+'x', pad.left-4, yPos(y)+3);
    }
    for (var x = 5; x <= 40; x += 5) {
      ctx.beginPath(); ctx.moveTo(xPos(x), pad.top); ctx.lineTo(xPos(x), pad.top+plotH); ctx.stroke();
      ctx.fillStyle = '#94a3b8';
      ctx.font = '9px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.textAlign = 'center'; ctx.fillText(x+'%', xPos(x), pad.top+plotH+12);
    }

    // PB=1 line
    ctx.strokeStyle = '#fecaca'; ctx.lineWidth = 0.8;
    ctx.setLineDash([3,2]);
    ctx.beginPath(); ctx.moveTo(pad.left, yPos(1)); ctx.lineTo(pad.left+plotW, yPos(1)); ctx.stroke();
    ctx.fillStyle = '#ef4444'; ctx.font = '8px sans-serif';
    ctx.textAlign = 'left'; ctx.fillText('PB=1', pad.left+plotW-38, yPos(1)-3);
    ctx.setLineDash([]);

    // PB-ROE curve
    ctx.strokeStyle = '#2C3E6B'; ctx.lineWidth = 1.8;
    ctx.beginPath();
    var started = false;
    for (var rv = 2; rv <= 40; rv += 0.5) {
      var rdec = rv/100, rv2 = rPct/100, gv2 = gPct/100;
      if (rdec > gv2 && rv2 > gv2) {
        var tv = (rdec - gv2) / (rv2 - gv2);
        if (tv >= 0 && tv <= 6) {
          if (!started) { ctx.moveTo(xPos(rv), yPos(tv)); started = true; }
          else { ctx.lineTo(xPos(rv), yPos(tv)); }
        }
      }
    }
    ctx.stroke();

    // Current ROE marker
    var curX = xPos(roePct);
    var roeD = roePct/100, rD = rPct/100, gD = gPct/100;
    var theoY = (roeD > gD && rD > gD) ? (roeD-gD)/(rD-gD) : -1;
    if (theoY >= 0 && theoY <= 6) {
      ctx.fillStyle = '#d97706';
      ctx.beginPath(); ctx.arc(curX, yPos(theoY), 4, 0, Math.PI*2); ctx.fill();
    }

    // Current PB line
    if (currentPB <= 6) {
      ctx.strokeStyle = '#d97706'; ctx.lineWidth = 0.8;
      ctx.setLineDash([2,2]);
      ctx.beginPath(); ctx.moveTo(pad.left, yPos(currentPB)); ctx.lineTo(pad.left+plotW, yPos(currentPB)); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = '#d97706'; ctx.font = '8px sans-serif';
      ctx.textAlign = 'right'; ctx.fillText('当前PB='+currentPB.toFixed(2), pad.left+plotW, yPos(currentPB)-2);
    }
  }

  mcapS.addEventListener('input', update);
  equityS.addEventListener('input', update);
  roeS.addEventListener('input', update);
  rS.addEventListener('input', update);
  gS.addEventListener('input', update);
  window.addEventListener('resize', update);
  update();
})();
</script>
</body>
</html>
