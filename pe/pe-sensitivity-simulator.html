<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PE 敏感性模拟器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#fff;color:#1e293b;padding:32px;max-width:920px;margin:0 auto}
h1{font-size:22px;font-weight:600;margin-bottom:2px;color:#2C3E6B}
h1 small{font-size:12px;font-weight:400;color:#94a3b8;margin-left:8px}
.sub{font-size:13px;color:#64748b;margin-bottom:14px}

.fr{border:1px solid #e2e8f0;border-radius:14px;padding:10px 16px;text-align:center;font-size:15px;font-weight:600;color:#2C3E6B;margin-bottom:14px;background:#f8fafc;line-height:1.6}
.fr em{font-style:normal;color:#e11d48;font-weight:700}

.sl{display:flex;flex-direction:column;gap:10px;background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:14px 20px;margin-bottom:14px}
.slr{display:flex;align-items:center;gap:12px}
.slr label{font-size:12px;color:#64748b;min-width:52px;font-weight:500}
.slr label em{font-style:normal;color:#1e293b;font-weight:600;font-size:13px}
.slr input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;background:#e2e8f0;outline:none}
.slr input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:16px;height:16px;border-radius:50%;background:#2C3E6B;cursor:pointer;border:2px solid #fff;box-shadow:0 1px 3px rgba(44,62,107,0.3)}
.slr input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:#2C3E6B;cursor:pointer;border:2px solid #fff}
.slr .rv{font-size:12px;color:#64748b;min-width:46px;text-align:right;font-weight:600;color:#1e293b}

.hr{text-align:center;margin-bottom:14px}
.hr .pe{font-size:56px;font-weight:700;color:#2C3E6B;line-height:1}
.hr .pl{font-size:13px;color:#64748b;margin-top:2px}
.hr .st{display:inline-block;margin-top:6px;padding:3px 12px;border-radius:12px;font-size:12px;font-weight:600}
.st-g{background:#dcfce7;color:#15803d}
.st-r{background:#fce4ec;color:#c62828}
.st-b{background:#f1f5f9;color:#475569}

.ch{border:1px solid #e2e8f0;border-radius:14px;padding:8px 10px 6px;margin-bottom:10px}
.ch canvas{width:100%;height:150px;display:block;border-radius:6px}

.fn{font-size:11px;color:#94a3b8;line-height:1.5}
</style>
</head>
<body>

<h1>PE 敏感性模拟器 <small>戈登增长模型</small></h1>
<p class="sub">调整 r、ROE、留存率 b，观察 PE 的变化</p>

<div class="fr">
  PE = (1 &minus; b) / (r &minus; g) &nbsp;&nbsp;其中&nbsp;&nbsp; <em>g = b &times; ROE</em>
</div>

<div class="sl">
  <div class="slr">
    <label>r（股权成本）<em id="rl">10.0%</em></label>
    <input type="range" id="rs" min="6" max="16" value="10" step="0.5">
    <span class="rv" id="rr">10.0%</span>
  </div>
  <div class="slr">
    <label>ROE<em id="roel">15.0%</em></label>
    <input type="range" id="roes" min="3" max="30" value="15" step="0.5">
    <span class="rv" id="roer">15.0%</span>
  </div>
  <div class="slr">
    <label>b（留存率）<em id="bl">50%</em></label>
    <input type="range" id="bs" min="0" max="100" value="50" step="2">
    <span class="rv" id="br">50%</span>
  </div>
</div>

<div class="hr">
  <div class="pe" id="pev">20.0x</div>
  <div class="pl">PE = (1 &minus; b) / (r &minus; g)</div>
  <div id="stb" class="st st-g">ROE > r，多留存创造价值</div>
</div>

<div class="ch">
  <canvas id="cv" width="880" height="150"></canvas>
</div>

<p class="fn">曲线展示不同留存率 b 下的 PE 值。红点标记当前参数位置。</p>

<script>
(function(){
  var rs=document.getElementById('rs'), roes=document.getElementById('roes'), bs=document.getElementById('bs');
  var cv=document.getElementById('cv'), cx=cv.getContext('2d');
  var W=880, H=150, pad={t:18,r:22,b:22,l:42}, pw=W-pad.l-pad.r, ph=H-pad.t-pad.b;

  function draw(){
    var r=parseFloat(rs.value)/100, roe=parseFloat(roes.value)/100, b=parseFloat(bs.value)/100;
    var g=b*roe, sp=r-g, pe=sp>0.001?(1-b)/sp:null;

    document.getElementById('rl').textContent=(r*100).toFixed(1)+'%';
    document.getElementById('rr').textContent=(r*100).toFixed(1)+'%';
    document.getElementById('roel').textContent=(roe*100).toFixed(1)+'%';
    document.getElementById('roer').textContent=(roe*100).toFixed(1)+'%';
    document.getElementById('bl').textContent=(b*100).toFixed(0)+'%';
    document.getElementById('br').textContent=(b*100).toFixed(0)+'%';

    var pev=document.getElementById('pev'), stb=document.getElementById('stb');
    if(pe!==null&&isFinite(pe)&&pe>0&&pe<500){pev.textContent=pe.toFixed(1)+'x';pev.style.color='#2C3E6B'}
    else if(pe!==null&&pe>=500){pev.textContent='发散';pev.style.color='#e11d48'}
    else{pev.textContent='N/A';pev.style.color='#94a3b8'}

    if(roe>r+0.002){stb.textContent='ROE > r，多留存创造价值';stb.className='st st-g'}
    else if(roe<r-0.002){stb.textContent='ROE < r，多分红创造价值';stb.className='st st-r'}
    else{stb.textContent='ROE ≈ r，留存与分红无差异';stb.className='st st-b'}

    cx.clearRect(0,0,W,H);
    var maxPE=80, pts=120, xs=[], ys=[];

    for(var i=0;i<=pts;i++){
      var bi=i/pts; xs.push(pad.l+bi*pw);
      var spc=r-bi*roe;
      if(spc>0.003){ys.push(pad.t+ph-Math.min((1-bi)/spc,maxPE)/maxPE*ph)}
      else{ys.push(null)}
    }

    // Grid
    cx.strokeStyle='#f1f5f9';cx.lineWidth=0.5;
    for(var yv=0;yv<=80;yv+=20){var gy=pad.t+ph-yv/maxPE*ph;cx.beginPath();cx.moveTo(pad.l,gy);cx.lineTo(W-pad.r,gy);cx.stroke()}
    for(var xv=0;xv<=100;xv+=20){var gx=pad.l+xv/100*pw;cx.beginPath();cx.moveTo(gx,pad.t);cx.lineTo(gx,pad.t+ph);cx.stroke()}

    // Labels
    cx.fillStyle='#94a3b8';cx.font='10px -apple-system,sans-serif';
    for(var yv=0;yv<=80;yv+=20){var gy=pad.t+ph-yv/maxPE*ph;cx.textAlign='right';cx.fillText(yv+'x',pad.l-6,gy+3)}
    for(var xv=0;xv<=100;xv+=20){cx.textAlign='center';cx.fillText(xv+'%',pad.l+xv/100*pw,H-5)}
    cx.fillStyle='#64748b';cx.font='10px -apple-system,sans-serif';cx.textAlign='center';cx.fillText('留存率 b',pad.l+pw/2,H-1)
    cx.save();cx.translate(12,pad.t+ph/2);cx.rotate(-Math.PI/2);cx.textAlign='center';cx.fillText('PE',0,0);cx.restore()

    // Fill
    var fv=-1,lv=-1;
    for(var i=0;i<=pts;i++){if(ys[i]!==null){if(fv<0)fv=i;lv=i}}
    cx.beginPath();var started=false;
    for(var i=0;i<=pts;i++){if(ys[i]===null){started=false;continue}if(!started){cx.moveTo(xs[i],ys[i]);started=true}else{cx.lineTo(xs[i],ys[i])}}
    if(lv>=0){cx.lineTo(xs[lv],pad.t+ph);cx.lineTo(xs[fv],pad.t+ph);cx.closePath()
      var gd=cx.createLinearGradient(0,pad.t,0,pad.t+ph);gd.addColorStop(0,'rgba(44,62,107,0.1)');gd.addColorStop(1,'rgba(44,62,107,0.01)')
      cx.fillStyle=gd;cx.fill()}

    // Curve
    cx.beginPath();started=false;
    for(var i=0;i<=pts;i++){if(ys[i]===null){started=false;continue}if(!started){cx.moveTo(xs[i],ys[i]);started=true}else{cx.lineTo(xs[i],ys[i])}}
    cx.strokeStyle='#2C3E6B';cx.lineWidth=2.5;cx.stroke()

    // Ref line
    var pz=r>0.003?1/r:0, yz=pad.t+ph-Math.min(pz,maxPE)/maxPE*ph
    cx.setLineDash([4,4]);cx.strokeStyle='#cbd5e1';cx.lineWidth=0.8
    cx.beginPath();cx.moveTo(pad.l,yz);cx.lineTo(W-pad.r,yz);cx.stroke();cx.setLineDash([])
    cx.fillStyle='#94a3b8';cx.font='9px -apple-system,sans-serif';cx.textAlign='right'
    cx.fillText('b=0 → PE='+(pz<500?pz.toFixed(1)+'x':'发散'),W-pad.r-4,yz-3)

    // Marker
    var mi=Math.round(b*pts)
    if(mi>=0&&mi<ys.length&&ys[mi]!==null){
      var mx=xs[mi],my=ys[mi]
      cx.beginPath();cx.arc(mx,my,5,0,Math.PI*2);cx.fillStyle='#fff';cx.fill()
      cx.beginPath();cx.arc(mx,my,3,0,Math.PI*2);cx.fillStyle='#e11d48';cx.fill()
      var pd=pe!==null&&isFinite(pe)&&pe<500?pe.toFixed(1)+'x':'发散'
      cx.fillStyle='#1e293b';cx.font='bold 10px -apple-system,sans-serif';cx.textAlign='center'
      var ly=my-12>pad.t?my-12:my+16
      cx.fillText('b='+(b*100).toFixed(0)+'%  PE='+pd,mx,ly)
    }
  }

  rs.addEventListener('input',draw);roes.addEventListener('input',draw);bs.addEventListener('input',draw);draw()
})();
</script>
</body>
</html>
