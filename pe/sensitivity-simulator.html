<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PE 敏感性模拟器 — 戈登增长模型</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #fff;
  color: #1a1a1a;
  padding: 24px;
  max-width: 800px;
  margin: 0 auto;
}
h1 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: #666; margin-bottom: 20px; }
.formula {
  background: #EEEDFE;
  border-radius: 10px;
  padding: 14px 20px;
  text-align: center;
  font-size: 18px;
  font-weight: 500;
  color: #3C3489;
  margin-bottom: 20px;
}
.control-row {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.control-group {
  flex: 1;
  min-width: 200px;
}
.control-group label {
  font-size: 13px;
  color: #666;
  display: block;
  margin-bottom: 4px;
}
.control-group label span { color: #1a1a1a; font-weight: 500; }
.control-group input[type="range"] { width: 100%; }
.range-labels {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: #999;
  margin-top: 2px;
}
.result-row {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 16px;
}
.metric-card {
  background: #f5f5f5;
  border-radius: 12px;
  padding: 12px 24px;
  text-align: center;
}
.metric-card .label { font-size: 12px; color: #666; margin-bottom: 4px; }
.metric-card .value { font-size: 32px; font-weight: 500; color: #1a1a1a; line-height: 1.2; }
.chart-container { position: relative; width: 100%; height: 260px; margin-bottom: 8px; }
.footnote { font-size: 12px; color: #999; }
</style>
</head>
<body>

<h1>PE 敏感性模拟器</h1>
<p class="subtitle">基于戈登增长模型 PE = (1 - b) / (r - g)，拖动滑块观察 PE 的变化</p>

<div class="formula">P/E = (1 &minus; b) / (r &minus; g)</div>

<div class="control-row">
  <div class="control-group">
    <label>r（股权成本）: <span id="rVal">10.0%</span></label>
    <input type="range" id="rSlider" min="6" max="16" value="10" step="0.5">
    <div class="range-labels"><span>6%</span><span>16%</span></div>
  </div>
  <div class="control-group">
    <label>g（永续增长率）: <span id="gVal">3.0%</span></label>
    <input type="range" id="gSlider" min="0" max="8" value="3" step="0.5">
    <div class="range-labels"><span>0%</span><span>8%</span></div>
  </div>
  <div class="control-group">
    <label>b（留存率）: <span id="bVal">60%</span></label>
    <input type="range" id="bSlider" min="0" max="100" value="60" step="5">
    <div class="range-labels"><span>全分红</span><span>全留存</span></div>
  </div>
</div>

<div class="result-row">
  <div class="metric-card">
    <div class="label">计算 PE</div>
    <div class="value" id="peResult">16.7x</div>
  </div>
  <div class="metric-card">
    <div class="label">分红率</div>
    <div class="value" id="payResult" style="font-size:24px;">40%</div>
  </div>
  <div class="metric-card">
    <div class="label">r &minus; g（安全边际）</div>
    <div class="value" id="spreadResult" style="font-size:24px;">7.0%</div>
  </div>
</div>

<div class="chart-container">
  <canvas id="peChart" role="img" aria-label="PE 与增长率关系图">浏览器不支持 Canvas</canvas>
</div>
<p class="footnote">当 g 接近 r 时，PE 急剧放大（发散）。右侧 g 轴折线下降表示 spread &le; 0.2%，模型失效。</p>

<script>
(function() {
  var rSlider = document.getElementById('rSlider');
  var gSlider = document.getElementById('gSlider');
  var bSlider = document.getElementById('bSlider');
  var peChart;
  var gValues = [];

  function compute() {
    var r = parseFloat(rSlider.value) / 100;
    var g = parseFloat(gSlider.value) / 100;
    var b = parseFloat(bSlider.value) / 100;
    var spread = r - g;
    var pe = spread > 0 ? (1 - b) / spread : null;
    document.getElementById('rVal').textContent = (r * 100).toFixed(1) + '%';
    document.getElementById('gVal').textContent = (g * 100).toFixed(1) + '%';
    document.getElementById('bVal').textContent = (b * 100).toFixed(0) + '%';
    document.getElementById('payResult').textContent = ((1 - b) * 100).toFixed(0) + '%';
    document.getElementById('spreadResult').textContent = (spread * 100).toFixed(1) + '%';
    var peEl = document.getElementById('peResult');
    if (pe !== null && isFinite(pe) && pe > 0 && pe < 1000) {
      peEl.textContent = pe.toFixed(1) + 'x';
      peEl.style.color = '#1a1a1a';
    } else if (pe !== null && pe >= 1000) {
      peEl.textContent = '发散';
      peEl.style.color = '#A32D2D';
    } else {
      peEl.textContent = 'N/A';
      peEl.style.color = '#999';
    }
    updateChart(r, b);
  }

  function updateChart(r, b) {
    var data = [];
    gValues = [];
    for (var i = 0; i <= 16; i++) {
      var g = i * 0.5 / 100;
      gValues.push((g * 100).toFixed(1) + '%');
      var spread = r - g;
      if (spread > 0.002) {
        var pe = (1 - b) / spread;
        data.push(pe > 50 ? 50 : Math.round(pe * 10) / 10);
      } else {
        data.push(null);
      }
    }
    if (peChart) {
      peChart.data.labels = gValues;
      peChart.data.datasets[0].data = data;
      peChart.update();
    }
  }

  function initChart() {
    var ctx = document.getElementById('peChart').getContext('2d');
    var r = parseFloat(rSlider.value) / 100;
    var b = parseFloat(bSlider.value) / 100;
    var data = [];
    for (var i = 0; i <= 16; i++) {
      var g = i * 0.5 / 100;
      gValues.push((g * 100).toFixed(1) + '%');
      var spread = r - g;
      if (spread > 0.002) {
        var pe = (1 - b) / spread;
        data.push(pe > 50 ? 50 : Math.round(pe * 10) / 10);
      } else { data.push(null); }
    }
    peChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: gValues,
        datasets: [{
          label: 'PE',
          data: data,
          backgroundColor: 'rgba(55, 138, 221, 0.6)',
          borderColor: '#185FA5',
          borderWidth: 1,
          borderRadius: 3
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: function(ctx) { return 'PE: ' + ctx.parsed.y + 'x'; } } } },
        scales: {
          x: { title: { display: true, text: '永续增长率 g', font: { size: 11 } }, ticks: { font: { size: 10 }, autoSkip: false, maxRotation: 0 } },
          y: { title: { display: true, text: 'PE（上限 50x）', font: { size: 11 } }, beginAtZero: true, max: 55, ticks: { font: { size: 10 } } }
        }
      }
    });
  }

  rSlider.addEventListener('input', compute);
  gSlider.addEventListener('input', compute);
  bSlider.addEventListener('input', compute);
  initChart();
  compute();
})();
</script>
</body>
</html>
