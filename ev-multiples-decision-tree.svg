<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 620" width="100%">
  <!-- Title -->
  <text x="340" y="30" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="600" fill="#1e293b">EV 倍数选择决策树</text>
  <text x="340" y="48" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#64748b">四个企业价值倍数分别在什么场景下使用</text>

  <!-- Root: Start -->
  <rect x="220" y="72" width="240" height="36" rx="18" fill="#2C3E6B" stroke-width="0"/>
  <text x="340" y="90" text-anchor="middle" dominant-baseline="central" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#fff">公司是否有正的利润/现金流？</text>

  <!-- Arrow down -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <polyline points="340,108 340,140" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Left branch: 亏损 -->
  <polyline points="340,140 140,140 140,172" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="40" y="180" width="200" height="40" rx="10" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
  <text x="140" y="200" text-anchor="middle" dominant-baseline="central" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#A32D2D">亏损/无正利润</text>

  <polyline points="140,220 140,252" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="20" y="260" width="240" height="48" rx="10" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="140" y="278" text-anchor="middle" dominant-baseline="central" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#854F0B">EV/Revenue</text>
  <text x="140" y="296" text-anchor="middle" dominant-baseline="central" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#633806">营收为正当分母，无视利润</text>

  <polyline points="140,308 140,340" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="10" y="348" width="260" height="48" rx="10" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="140" y="366" text-anchor="middle" dominant-baseline="central" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#854F0B">校验: 毛利率是否为正？</text>
  <text x="140" y="384" text-anchor="middle" dominant-baseline="central" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#633806">营收能转化利润才有意义</text>

  <!-- Right branch: 有利润 -->
  <polyline points="340,140 540,140 540,172" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="440" y="180" width="200" height="40" rx="10" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
  <text x="540" y="200" text-anchor="middle" dominant-baseline="central" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#3B6D11">有正利润/EBITDA</text>

  <polyline points="540,220 540,252" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="410" y="260" width="260" height="48" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text x="540" y="278" text-anchor="middle" dominant-baseline="central" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#185FA5">DA/EBITDA 占比高吗？</text>
  <text x="540" y="296" text-anchor="middle" dominant-baseline="central" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#0C447C">折旧摊销占 EBITDA 比例</text>

  <!-- DA low -->
  <polyline points="410,284 320,284 320,340" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="210" y="348" width="220" height="48" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="320" y="366" text-anchor="middle" dominant-baseline="central" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#0F6E56">DA低 → EV/EBITDA</text>
  <text x="320" y="384" text-anchor="middle" dominant-baseline="central" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#085041">典型：科技、消费、医药</text>

  <!-- DA high -->
  <polyline points="670,284 670,340" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="560" y="348" width="220" height="48" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="670" y="366" text-anchor="middle" dominant-baseline="central" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#0F6E56">DA高 → EV/EBIT</text>
  <text x="670" y="384" text-anchor="middle" dominant-baseline="central" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#085041">典型：制造、钢铁、电信</text>

  <!-- Both down to FCF question -->
  <polyline points="320,396 320,428 445,428 445,460" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <polyline points="670,396 670,428 445,428" fill="none" stroke="#94a3b8" stroke-width="1.5"/>

  <rect x="260" y="468" width="370" height="48" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text x="445" y="486" text-anchor="middle" dominant-baseline="central" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#185FA5">需要验证现金创造能力吗？</text>
  <text x="445" y="504" text-anchor="middle" dominant-baseline="central" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#0C447C">Capex 占比高？营运资本波动大？</text>

  <!-- FCF yes/no -->
  <polyline points="260,492 140,492 140,540" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="30" y="548" width="220" height="48" rx="10" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
  <text x="140" y="566" text-anchor="middle" dominant-baseline="central" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#3B6D11">否 → EBIT/EBITDA 足够</text>
  <text x="140" y="584" text-anchor="middle" dominant-baseline="central" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#27500A">轻资产、现金流稳定的行业</text>

  <polyline points="630,492 630,540" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="500" y="548" width="260" height="48" rx="10" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
  <text x="630" y="566" text-anchor="middle" dominant-baseline="central" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#993C1D">是 → 追加 EV/FCF</text>
  <text x="630" y="584" text-anchor="middle" dominant-baseline="central" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#712B13">FCF转化率差异大的行业</text>
</svg>